<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagepläne – Bull Sommerfest 2027</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><span class="logo-emoji">🌻</span><span class="logo-text">Sommerfest 2027</span></a>
    <button class="nav-toggle" aria-label="Menü öffnen" onclick="toggleNav()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Start</a>
      <a href="zimmer.html">Zimmer</a>
      <a href="lageplaene.html" class="active">Lagepläne</a>
      <a href="partyraum.html">Partyraum</a>
      <a href="anfahrt.html">Anfahrt</a>
      <a href="samstag.html">Party-Samstag</a>
      <a href="abreise.html">Abreise</a>
      <a href="pinnwand.html">Pinnwand</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Lagepläne</h1>
  <p>Grundrisse und Übersichtspläne des Holthofs</p>
</div>

<main>
  <div class="lageplan-grid">

    <figure class="lageplan-figure">
      <img src="img/lageplan_1.jpg" alt="Grundriss ganzes Haus – Erdgeschoss" onclick="openLightbox(this.src)">
      <figcaption>Grundriss ganzes Haus – Erdgeschoss</figcaption>
    </figure>

    <figure class="lageplan-figure">
      <img src="img/lageplan_8.jpg" alt="Pferdestall" onclick="openLightbox(this.src)">
      <figcaption>Pferdestall</figcaption>
    </figure>

    <figure class="lageplan-figure">
      <img src="img/lageplan_3.jpg" alt="Grundriss Pferdestall oben & unten" onclick="openLightbox(this.src)">
      <figcaption>Grundriss Pferdestall oben &amp; unten</figcaption>
    </figure>

    <figure class="lageplan-figure">
      <img src="img/lageplan_4.jpg" alt="Ferienwohnung 1 oben & unten" onclick="openLightbox(this.src)">
      <figcaption>Ferienwohnung 1 oben &amp; unten</figcaption>
    </figure>

    <figure class="lageplan-figure">
      <img src="img/lageplan_5.jpg" alt="Ferienwohnung 2" onclick="openLightbox(this.src)">
      <figcaption>Ferienwohnung 2</figcaption>
    </figure>

    <figure class="lageplan-figure">
      <img src="img/lageplan_9.jpg" alt="Ferienwohnung 3" onclick="openLightbox(this.src)">
      <figcaption>Ferienwohnung 3</figcaption>
    </figure>

  </div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="Vollbild">
</div>

<footer>Sommer-Fest der Familie Bull · Holthof · 08. Juli 2027</footer>

<script>
function toggleNav(){document.getElementById('navLinks').classList.toggle('open');}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>
</body>
</html>
