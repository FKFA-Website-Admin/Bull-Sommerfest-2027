<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partyraum & Außenbereich – Bull Sommerfest 2027</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><span class="logo-emoji">🌻</span><span class="logo-text">Sommerfest 2027</span></a>
    <button class="nav-toggle" aria-label="Menü öffnen" onclick="toggleNav()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Start</a>
      <a href="zimmer.html">Zimmer</a>

      <a href="partyraum.html" class="active">Partyraum</a>
      <a href="anfahrt.html">Anfahrt</a>
      <a href="samstag.html">Party-Samstag</a>
      <a href="abreise.html">Abreise</a>
      <a href="pinnwand.html">Pinnwand</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Partyraum &amp; Außenbereich</h1>
  <p>Impressionen vom Festgelände – zum Vergrößern anklicken</p>
</div>

<main>
  <div class="photo-group">
    <div class="photo-group-label">Partyraum</div>
    <div class="gallery">
      <img src="img/ps_unten_10.jpg" alt="Partyraum" onclick="openLightbox(this.src)">
      <img src="img/ps_unten_9.jpg"  alt="Partyraum" onclick="openLightbox(this.src)">
      <img src="img/ps_unten_5.jpg"  alt="Partyraum" onclick="openLightbox(this.src)">
      <img src="img/ps_unten_4.jpg"  alt="Partyraum" onclick="openLightbox(this.src)">
      <img src="img/ps_unten_3.jpg"  alt="Partyraum" onclick="openLightbox(this.src)">
      <img src="img/partyraum_12.jpg" alt="Partyraum" onclick="openLightbox(this.src)">
    </div>
  </div>

  <div class="photo-group">
    <div class="photo-group-label">Außenbereich</div>
    <div class="gallery">
      <img src="img/partyraum_14.jpg" alt="Außenbereich" onclick="openLightbox(this.src)">
      <img src="img/partyraum_13.jpg" alt="Außenbereich" onclick="openLightbox(this.src)">
      <img src="img/partyraum_11.jpg" alt="Außenbereich" onclick="openLightbox(this.src)">
      <img src="img/partyraum_9.jpg"  alt="Außenbereich" onclick="openLightbox(this.src)">
      <img src="img/partyraum_8.jpg"  alt="Außenbereich" onclick="openLightbox(this.src)">
      <img src="img/partyraum_7.jpg"  alt="Außenbereich" onclick="openLightbox(this.src)">
    </div>
  </div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="Vollbild">
</div>

<footer>Sommer-Fest der Familie Bull · Holthof · 08. Juli 2027</footer>

<script>
function toggleNav(){document.getElementById('navLinks').classList.toggle('open');}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>
</body>
</html>
