<main>
  <div class="gallery" id="gallery">
    <img src="img/partyraum_1.jpg" alt="Partyraum" onclick="openLightbox(this.src)">
    <img src="img/partyraum_2.jpg" alt="Partyraum" onclick="openLightbox(this.src)">
    <img src="img/partyraum_3.jpg" alt="Partyraum" onclick="openLightbox(this.src)">
    <img src="img/partyraum_4.jpg" alt="Partyraum" onclick="openLightbox(this.src)">

  </div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="" alt="Vollbild">
</div>

<footer>
  Sommer-Fest der Familie Bull · Holthof 2026
</footer>

<script>
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
